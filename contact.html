<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Erica Manyama</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family: 'Poppins', sans-serif;
background:#0f172a;
color:white;
}

/* STAR BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.2;
z-index:-1;
}

/* TITLE */

.contact-header{
text-align:center;
padding:70px 20px;
}

.contact-header h1{
font-size:40px;
}

/* GRID */

.contact-grid{
display:flex;
justify-content:center;
gap:60px;
padding:40px;
flex-wrap:wrap;
}

/* CONTACT INFO */

.contact-info{
max-width:350px;
}

.contact-item{
display:flex;
align-items:center;
margin-bottom:25px;
}

.contact-item i{
font-size:20px;
color:#a78bfa;
margin-right:15px;
width:30px;
}

/* LINKS */

.contact-item a{
color:white;
text-decoration:none;
}

/* MAP */

.map iframe{
width:450px;
height:300px;
border-radius:10px;
border:none;
}

/* FORM */

.form-section{
display:flex;
justify-content:center;
padding:60px;
}

form{
width:600px;
}

input, textarea{
width:100%;
padding:15px;
margin-bottom:20px;
border-radius:6px;
border:none;
}

textarea{
height:150px;
resize:none;
}

button{
background:#14b8a6;
color:white;
border:none;
padding:14px 30px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0f766e;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
border-top:1px solid #333;
color:#aaa;
margin-top:40px;
}

</style>

</head>

<body>

<section class="contact-header">

<h1>Contact Me</h1>
<p>Feel free to reach out for collaborations or opportunities.</p>

</section>


<!-- CONTACT INFO + MAP -->

<section class="contact-grid">

<div class="contact-info">

<div class="contact-item">
<i class="fa-solid fa-envelope"></i>
<a href="mailto:ericacjmanyama@gmail.com">
ericacjmanyama@gmail.com
</a>
</div>

<div class="contact-item">
<i class="fa-brands fa-github"></i>
<a href="https://github.com/EricaManyama123" target="_blank">
github.com/EricaManyama123
</a>
</div>

<div class="contact-item">
<i class="fa-brands fa-linkedin"></i>
<a href="https://www.linkedin.com/in/erica-joshua-9749272a1/" target="_blank">
LinkedIn Profile
</a>
</div>

<div class="contact-item">
<i class="fa-solid fa-phone"></i>
+91 6280388425
</div>

</div>


<div class="map">

<iframe
src="https://www.google.com/maps?q=Lovely%20Professional%20University&output=embed">
</iframe>

</div>

</section>


<!-- CONTACT FORM -->

<section class="form-section">

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<input type="text" name="subject" placeholder="Subject">

<textarea name="message" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</section>


<footer>

© 2026 Erica Manyama | Data Analyst Portfolio

</footer>

</body>
</html>
