<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Erica Manyama | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
height:100vh;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 10%;
}

.logo{
font-size:24px;
font-weight:600;
color:#c084fc;
}

nav ul{
list-style:none;
display:flex;
gap:30px;
}

nav ul li a{
text-decoration:none;
color:white;
font-weight:500;
}

nav ul li a:hover{
color:#c084fc;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:80px 10%;
flex-wrap:wrap;
}

.hero-text{
max-width:600px;
}

.hero-text h3{
font-size:28px;
margin-bottom:10px;
}

.hero-text h1{
font-size:50px;
color:#c084fc;
margin-bottom:20px;
}

.hero-text h2{
font-size:30px;
font-weight:400;
}

.hero-text span{
color:#c084fc;
}

.hero-img img{
width:350px;
}

/* typing cursor */

.typing{
border-right:3px solid #c084fc;
white-space:nowrap;
overflow:hidden;
}

@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
}

.hero-img img{
margin-top:40px;
width:250px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">EM.</div>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="skills.html">Skills</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="certifications.html">Certifications</a></li>
<li><a href="resume.html">Resume</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

<section class="hero">

<div class="hero-text">

<h3>Hi There! 👋</h3>

<h1>I'm Erica Manyama</h1>

<h2 class="typing" id="typing-text"></h2>

</div>

<div class="hero-img">

<img src="https://cdni.iconscout.com/illustration/premium/thumb/programmer-working-on-laptop-illustration-download-in-svg-png-gif-file-formats--coding-development-programming-developer-pack-design-illustrations-3544443.png">

</div>

</section>

<script>

const text = "Data Analyst | Data Scientist";
let index = 0;

function typeEffect() {

if(index < text.length){

document.getElementById("typing-text").innerHTML += text.charAt(index);

index++;

setTimeout(typeEffect, 80);

}

}

typeEffect();

</script>

</body>

</html>
